<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka Szlaków</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px;
            color: #222;
            background-color: #fafafa;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        #chat-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .msg-user {
            align-self: flex-end;
            background-color: #222;
            color: #fff;
        }

        .msg-assistant {
            align-self: flex-start;
            background-color: #eee;
            color: #222;
            white-space: pre-wrap;
        }

        #input-container {
            display: flex;
            gap: 10px;
        }

        #query {
            flex-grow: 1;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        #btn-search {
            padding: 0 24px;
            font-size: 16px;
            font-weight: 600;
            background-color: #222;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #btn-search:disabled {
            background-color: #888;
            cursor: not-allowed;
        }

        .loading-text {
            color: #888;
            font-style: italic;
            align-self: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Doradca Górski AI</h1>

    <div id="chat-container">
        <div class="msg msg-assistant">Cześć, jestem tutaj aby wybrać dla ciebie najlepszy szlak górski w tatrach.
            Opowiedz coś o sobie.</div>
    </div>
    <div id="loading" class="loading-text" style="display: none;">Asystent myśli...</div>

    <div id="input-container">
        <input type="text" id="query" placeholder="Napisz wiadomość..."
            onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="btn-search" onclick="sendMessage()">Wyślij</button>
    </div>

    <script>
        let conversationHistory = [];
        let extractedState = {
            "doswiadczenie": null,
            "czas_lub_dystans": null,
            "preferencje": null,
            "z_kim_idzie": null
        };

        function appendMessage(role, content) {
            const chatContainer = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-assistant');
            msgDiv.innerText = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const queryInput = document.getElementById('query');
            const content = queryInput.value.trim();
            const searchBtn = document.getElementById('btn-search');
            const loading = document.getElementById('loading');

            if (!content) return;

            appendMessage('user', content);
            conversationHistory.push({ role: 'user', content: content });

            queryInput.value = '';
            queryInput.disabled = true;
            searchBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        state: extractedState
                    })
                });

                const data = await response.json();

                if (data.error) {
                    appendMessage('assistant', "Error: " + data.error);
                } else {
                    appendMessage('assistant', data.response);
                    conversationHistory.push({ role: 'assistant', content: data.response });
                    if (data.new_state) {
                        extractedState = data.new_state;
                    }
                }
            } catch (err) {
                appendMessage('assistant', "Server connection error.");
            } finally {
                loading.style.display = 'none';
                queryInput.disabled = false;
                searchBtn.disabled = false;
                queryInput.focus();
            }
        }
    </script>
</body>

</html>
